# this wordpress instance is the headless CMS backend for www.miivo.ai —
# it must never appear in search results (google was surfacing these urls
# instead of the live site). the X-Robots-Tag header covers html pages,
# media and the rest api without touching the database, and does not block
# the server-to-server fetches from the next.js app or social scrapers.
Header always set X-Robots-Tag "noindex, nofollow"

# the render persistent disk mounted at /var/www/html shadows any robots.txt
# baked into the docroot, so serve one from outside it via an alias. this
# also bypasses wordpress's virtual robots.txt, which advertised a sitemap
# to search engines.
Alias /robots.txt /opt/staging/robots.txt
<Directory /opt/staging>
    Require all granted
</Directory>
